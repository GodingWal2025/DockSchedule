{% extends 'pit/base.html' %}

{% block title %}Select Operator - PIT{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-4">
        <div class="card" style="border: 1.5px solid var(--rule-soft);">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div style="width:72px;height:72px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:var(--accent-bg);border:1px solid var(--accent);">
                        <i class="bi bi-person-badge" style="font-size:32px;color:var(--accent);"></i>
                    </div>
                    <h2 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:-.02em;margin-bottom:4px;">PIT Operator</h2>
                    <p style="font-size:13px;color:var(--ink-soft);letter-spacing:.02em;margin:0;">Select your name to continue</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);font-weight:500;display:block;margin-bottom:6px;">Operator</label>
                        <select name="operator" class="form-select form-select-lg" required>
                            <option value="">— Select Name —</option>
                            {% for op in operators %}
                            <option value="{{ op.id }}">{{ op.name }} {% if op.initials %}({{ op.initials }}){% endif %}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100" style="font-weight:600;font-size:16px;letter-spacing:.02em;">
                        Go to Work <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="{% url 'dashboard' %}" style="font-size:12px;color:var(--ink-faint);text-decoration:none;letter-spacing:.04em;text-transform:uppercase;">
                <i class="bi bi-arrow-left"></i> Back to GXO Dock
            </a>
        </div>
    </div>
</div>
{% endblock %}
