{% extends 'pit/base.html' %}

{% block title %}Select Operator - PIT{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body text-center p-5">
                <i class="bi bi-person-badge display-1 text-primary mb-3"></i>
                <h2 class="fw-bold mb-4">PIT Operator</h2>
                <p class="text-muted mb-4">Select your name to continue</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <select name="operator" class="form-select form-select-lg text-center" required>
                            <option value="">-- Select Name --</option>
                            {% for op in operators %}
                            <option value="{{ op.id }}">{{ op.name }} {% if op.initials %}({{ op.initials }}){% endif %}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold fs-4">
                        <i class="bi bi-arrow-right-circle"></i> Go to Work
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
