{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111110">
    <title>{% block title %}PIT Operator{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'pit/css/pit.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom py-2">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'pit_board' %}">
                <img src="{% static 'img/gxo-logo.svg' %}" alt="GXO Logo" height="24" class="d-inline-block align-text-top">
                <span style="font-size:14px;font-weight:700;letter-spacing:.04em;color:#fff;margin-left:8px;">
                    PIT<span style="color:#e7372c;">.</span>
                </span>
            </a>
            {% if operator %}
            <div class="d-flex align-items-center gap-3">
                <span style="color:rgba(255,255,255,.7);font-size:13px;"><i class="bi bi-person-circle" style="color:var(--accent);margin-right:4px;"></i> {{ operator.name }}</span>
                <a href="{% url 'pit_select' %}" class="btn btn-outline-light btn-sm" style="font-size:11px;padding:4px 10px;min-height:auto;border-color:rgba(255,255,255,.2) !important;">Change</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container-fluid mt-3">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
