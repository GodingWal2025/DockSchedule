{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111110">
    <title>{% block title %}PIT Operator{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'pit/css/pit.css' %}?v=1">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom py-2" style="background: #ffffff !important; border-bottom: 1px solid var(--rule-soft) !important;">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center text-decoration-none" href="{% url 'pit_board' %}">
                <span style="font-family: Arial Black, Arial, sans-serif; font-weight: 900; font-size: 20px; color: var(--accent); letter-spacing: -1px; line-height: 1;">GXO</span>
                <span class="ms-2 fw-bold" style="font-size: 13px; font-family: var(--font-sans); color: var(--ink); letter-spacing: .04em; text-transform: uppercase; line-height: 1;">
                    PIT<span style="color: var(--accent);">.</span>
                </span>
            </a>
            {% if operator %}
            <div class="d-flex align-items-center gap-3">
                <span style="color: var(--ink-soft); font-size: 13px; font-family: var(--font-sans); font-weight: 500;">
                    <i class="bi bi-person-circle" style="color: var(--accent); margin-right: 4px;"></i> {{ operator.name }}
                </span>
                <a href="{% url 'pit_select' %}" class="btn btn-outline-dark btn-sm" style="font-size: 11px; padding: 4px 10px; min-height: auto;">Change</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container-fluid mt-3">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
