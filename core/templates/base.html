<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111110">
  <title>{% block title %}GXO Dock{% endblock %}</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/custom.css' %}" rel="stylesheet">
  {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
        <img src="{% static 'img/gxo-logo.svg' %}" alt="GXO Logo" height="28" class="d-inline-block align-text-top">
        <span style="font-size:16px;font-weight:700;letter-spacing:.04em;color:#fff;margin-left:10px;">
          DOCK<span style="color:#e7372c;">SCHEDULE</span>
        </span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {% block nav_dashboard %}{% endblock %}" href="{% url 'dashboard' %}">
              <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_add_appointment %}{% endblock %}" href="{% url 'add_appointment' %}">
              <i class="bi bi-plus-circle me-1"></i>Add Appointment
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_appointment_list %}{% endblock %}" href="{% url 'appointment_list' %}">
              <i class="bi bi-list-ul me-1"></i>Appointments
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_check_in %}{% endblock %}" href="{% url 'check_in' %}">
              <i class="bi bi-box-arrow-in-right me-1"></i>Check-In
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_check_out %}{% endblock %}" href="{% url 'check_out' %}">
              <i class="bi bi-box-arrow-left me-1"></i>Check-Out
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_kpi_export %}{% endblock %}" href="{% url 'kpi_export' %}">
              <i class="bi bi-file-earmark-spreadsheet me-1"></i>KPI Export
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'pit_board' %}" target="_blank">
              <i class="bi bi-forklift me-1"></i>PIT App
            </a>
          </li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="/admin/" target="_blank">
              <i class="bi bi-gear-fill me-1"></i>Admin
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow-1 py-4">
    <div class="container-fluid">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-top text-center py-3 mt-auto">
    <div class="container">
      <small class="text-muted" style="font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;">
        GXO Dock&shy;Schedule &copy; {% now "Y" %}
      </small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
